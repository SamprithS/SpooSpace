<div
  class="card-wrapper"
  [ngStyle]="cardStyle"
  (mousedown)="onMouseDown($event)"
  (touchstart)="onTouchStart($event)"
  (touchmove)="onTouchMove($event)"
  (touchend)="onTouchEnd()"
>
  <div class="card-inner">

    <!-- Glow overlay — sits on top of everything, colour changes on drag -->
    <div class="swipe-glow" [ngStyle]="glowStyle"></div>

    <!-- Direction arrow — appears as you drag -->
    <div class="direction-label direction-left" [ngStyle]="directionLabelStyle">
      <span *ngIf="swipeDirection === 'left'">←</span>
    </div>
    <div class="direction-label direction-right" [ngStyle]="directionLabelStyle">
      <span *ngIf="swipeDirection === 'right'">→</span>
    </div>

    <!-- Image area -->
    <div class="card-image">
      <img
        *ngIf="quote.imageUrl && quote.imageUrl !== ''"
        [src]="quote.imageUrl"
        [alt]="quote.memberName"
        class="idol-photo"
      />
      <div class="card-image-overlay"></div>
      <div *ngIf="!quote.imageUrl || quote.imageUrl === ''" class="card-sparkle">✦</div>
      <div class="member-badge">
        <p class="member-name">{{ quote.memberName | uppercase }}</p>
      </div>
    </div>

    <!-- Quote text area -->
    <div class="card-body">
      <blockquote class="quote-text">"{{ quote.quoteText }}"</blockquote>
      <div class="quote-meta">
        <div class="meta-line"></div>
        <span class="group-name">{{ quote.groupName }}</span>
      </div>
    </div>

  </div>
</div>
